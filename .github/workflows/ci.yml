name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: leader
          POSTGRES_PASSWORD: leader
          POSTGRES_DB: leader
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U leader"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://leader:leader@localhost:5432/leader?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Apply migrations
        run: npx prisma migrate deploy
      - name: Seed database
        run: npm run db:seed
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: leader
          POSTGRES_PASSWORD: leader
          POSTGRES_DB: leader
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U leader"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://leader:leader@localhost:5432/leader?schema=public
      BASE_URL: http://localhost:3000
      EMAIL_PROVIDER: console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run db:seed
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
      - name: Start server
        run: |
          npm run start &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/health > /dev/null; then echo "server up"; break; fi
            sleep 1
          done
      - name: Run E2E
        run: npm run test:e2e
